name: CI

on:
  push:
    branches: ['**']
  pull_request:

jobs:
  ci:
    name: Lint, tests, build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Installer les dépendances
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Tests (domaine, application, infrastructure)
        run: npm test

      - name: Build (serveur + front)
        run: npm run build
